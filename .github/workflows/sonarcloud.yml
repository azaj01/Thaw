name: SonarQube Analysis
on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  sonarqube:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build and Test
        run: |
          xcodebuild test \
            -project Thaw.xcodeproj \
            -scheme Thaw \
            -derivedDataPath Build/ \
            -destination 'platform=macOS' \
            enableCodeCoverage=YES \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Install xcresultparser
        run: brew install a7ex/homebrew-formulae/xcresultparser

      - name: Convert XCResult to SonarQube coverage XML
        run: xcresultparser -c -o xml Build/Logs/Test/*.xcresult > coverage.xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # Dummy job that passes for forks (no access to SONAR_TOKEN secret)
  sonarqube-skip-forks:
    if: github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Skip SonarQube for fork PRs
        run: |
          echo "Skipping SonarQube analysis for PR from fork"
          echo "Analysis will be performed after merge to main branch"
